# Unsupervised anomaly detection configuration.
# The model is used only as a comparison with rule-based risk scoring.

model:
  name: isolation_forest
  contamination: 0.05
  random_state: 42
  n_estimators: 200

features:
  - transaction_amount
  - transaction_duration
  - login_attempts
  - account_balance
  - minutes_since_previous_transaction
  - transaction_hour