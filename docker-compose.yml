services:
  pipeline:
    build: .
    container_name: transaction-monitoring-pipeline
    command: python scripts/10_run_pipeline.py
    volumes:
      - ./data:/app/data
      - ./warehouse:/app/warehouse
      - ./reports:/app/reports

  api:
    build: .
    container_name: transaction-monitoring-api
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000
    ports:
      - "8000:8000"
    volumes:
      - ./data:/app/data
      - ./warehouse:/app/warehouse
      - ./reports:/app/reports